version: '3.8'

networks:
  stock-net:
    driver: bridge

volumes:
  stock-data:      # 持久化 SQLite 数据库
  redis-data:

services:
  redis:
    image: redis:7-alpine
    container_name: stock-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - stock-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - stock-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/stock_advisor.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stock-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
    container_name: stock-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - stock-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
